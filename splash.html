<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Edebiyat Projesi</title>
<style>
    body, html {
        margin: 0;
        padding: 0;
        height: 100%;
        font-family: Arial, sans-serif;
    }

    /* Sol üst bilgi kutusu */
    #info-box {
        position: fixed;
        top: 10px;
        left: 10px;
        background-color: rgba(255,255,255,0.8);
        color: #4B0082;
        padding: 10px 15px;
        border-radius: 10px;
        font-size: 0.9em;
        font-weight: bold;
        z-index: 1001;
    }

    /* Splash ekran */
    #splash {
        display: flex;
        flex-direction: column;
        justify-content: center;
        align-items: center;
        height: 100vh;
        background-color: #4B0082;
        color: #fff;
        text-align: center;
    }
    #splash h1 {
        font-size: 3em;
        margin: 0;
    }
    #splash p {
        margin-top: 20px;
        font-size: 1.2em;
    }
    #splash button {
        margin-top: 30px;
        padding: 10px 20px;
        font-size: 1em;
        border: none;
        border-radius: 10px;
        cursor: pointer;
        font-weight: bold;
        background-color: #fff;
        color: #4B0082;
        transition: background-color 0.3s;
    }
    #splash button:hover {
        background-color: #ddd;
    }
</style>
</head>
<body>

<!-- Sol üst bilgi kutusu -->
<div id="info-box">
    1 Ocak 2026<br>
    Hazırlayan: Zeynep Aşkın 10-İ 399
</div>

<!-- Splash ekranı -->
<div id="splash">
    <h1>Edebiyat Projesi</h1>
    <p>Projeyi başlatmak için tıklayın veya kaydırın</p>
    <button onclick="goToIndex()">Başlat</button>
</div>

<script>
    function goToIndex() {
        window.location.href = "index.html";
    }

    // Kaydırma veya dokunmayla da geçiş
    window.addEventListener('wheel', goToIndex, { once: true });
    window.addEventListener('touchstart', goToIndex, { once: true });
</script>

</body>
</html>
